name: Backend CI/CD

on:
    push:
        branches: [backend]
        paths:
            - "Backendjs/**"
            - ".github/workflows/backend-deploy.yml"
    pull_request:
        branches: [backend]
        paths:
            - "Backendjs/**"
    workflow_dispatch:
        branches: [backend]

concurrency:
    group: backend-deploy-${{ github.ref }}
    cancel-in-progress: true

jobs:
    ci:
        name: Validate backend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: Backendjs
        steps:
            - name: Checkout Backendjs only
              uses: actions/checkout@v4
              with:
                  sparse-checkout: Backendjs
                  sparse-checkout-cone-mode: true

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Syntax check entrypoint
              run: node --check lib/index.js

    deploy:
        name: Deploy Backendjs to FTP server
        needs: ci
        if: github.ref == 'refs/heads/backend' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: Backendjs
        environment: production
        steps:
            - name: Checkout Backendjs only
              uses: actions/checkout@v4
              with:
                  sparse-checkout: Backendjs
                  sparse-checkout-cone-mode: true

            - name: Install lftp
              run: sudo apt-get update && sudo apt-get install -y lftp

            - name: Validate FTP configuration
              env:
                  FTP_SERVER: ${{ secrets.FTP_SERVER }}
                  FTP_USER: ${{ secrets.FTP_USER }}
                  FTP_PASS: ${{ secrets.FTP_PASS }}
                  FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
              run: |
                  set -euo pipefail

                  if [ -z "${FTP_SERVER:-}" ] || [ -z "${FTP_USER:-}" ] || [ -z "${FTP_PASS:-}" ] || [ -z "${FTP_REMOTE_DIR:-}" ]; then
                    echo "Missing FTP secrets. Configure FTP_SERVER, FTP_USER, FTP_PASS, and FTP_REMOTE_DIR."
                    echo "This job uses the 'production' environment — set secrets under Settings → Environments → production, or at repo level."
                    exit 1
                  fi

                  # Strip protocol, path, and whitespace from host (common secret mistakes)
                  FTP_SERVER="${FTP_SERVER#ftp://}"
                  FTP_SERVER="${FTP_SERVER#ftps://}"
                  FTP_SERVER="${FTP_SERVER%%/*}"
                  FTP_SERVER="$(echo "$FTP_SERVER" | xargs)"

                  if [ -z "$FTP_SERVER" ]; then
                    echo "FTP_SERVER is empty after normalization. Use only the hostname, e.g. ftp.nishree.com"
                    exit 1
                  fi

                  echo "FTP host (normalized): $FTP_SERVER"
                  echo "FTP user: $FTP_USER"
                  echo "FTP remote dir: $FTP_REMOTE_DIR"

                  if ! getent hosts "$FTP_SERVER" > /dev/null; then
                    echo "DNS lookup failed for '$FTP_SERVER'. Check the FTP_SERVER secret — no ftp:// prefix, no trailing slash."
                    exit 1
                  fi

                  echo "DNS lookup OK"

            - name: Upload to FTP
              env:
                  FTP_SERVER: ${{ secrets.FTP_SERVER }}
                  FTP_USER: ${{ secrets.FTP_USER }}
                  FTP_PASS: ${{ secrets.FTP_PASS }}
                  FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
              run: |
                  set -euo pipefail

                  FTP_SERVER="${FTP_SERVER#ftp://}"
                  FTP_SERVER="${FTP_SERVER#ftps://}"
                  FTP_SERVER="${FTP_SERVER%%/*}"
                  FTP_SERVER="$(echo "$FTP_SERVER" | xargs)"

                  export LFTP_PASSWORD="$FTP_PASS"

                  MIRROR_EXCLUDES=""
                  append_exclude() {
                    local pattern="$1"
                    pattern="${pattern%/}"
                    pattern="${pattern#/}"
                    [[ -z "$pattern" ]] && return
                    MIRROR_EXCLUDES+=" --exclude-glob $pattern"
                    MIRROR_EXCLUDES+=" --exclude-glob $pattern/**"
                  }
                  if [ -f ".gitignore" ]; then
                    while IFS= read -r pattern || [ -n "$pattern" ]; do
                      [[ -z "$pattern" || "$pattern" =~ ^# ]] && continue
                      append_exclude "$pattern"
                    done < .gitignore
                  fi
                  append_exclude ".git"
                  append_exclude ".gitignore"
                  append_exclude ".DS_Store"
                  append_exclude "deploy.sh"

                  lftp -u "$FTP_USER" --env-password "$FTP_SERVER" <<EOF
                  set ftp:ssl-allow yes
                  set ssl:verify-certificate no
                  mirror --reverse --delete --verbose --parallel=10$MIRROR_EXCLUDES . $FTP_REMOTE_DIR
                  bye
                  EOF

            - name: Deployment summary
              run: echo "Backendjs deployed to $FTP_REMOTE_DIR on $FTP_SERVER"
              env:
                  FTP_SERVER: ${{ secrets.FTP_SERVER }}
                  FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
